    text-align: center;
  }
  .reborn-header h1 {
    font-weight: 700;
    font-size: 28px;
    color: var(--primary-green);
    letter-spacing: 1px;
    margin: 0;
  }
  .reborn-header p {

  }

  .global-timer-area {

    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
    border: 1px solid var(--border-light);
  }
  .global-timer {
    font-family: monospace;
    font-size: 20px;   /* smaller as requested */
    font-weight: 700;
    color: var(--primary-green);
    letter-spacing: 1px;
    background: var(--bg-soft);

  }

  .early-submit-all {

    font-weight: 600;
    color: var(--primary-green);
  }
  .part-submit-btn {
    background: var(--primary-green);

    padding: 6px 20px;
    border-radius: 32px;
    font-weight: 600;

  .group { border: 1px solid var(--border-light); border-radius: 20px; padding: 18px 22px; margin: 24px 0; }

    border-radius: 24px;
    cursor: grab;
    font-weight: 500;
    color: var(--primary-green);

  .drag-option {
    background: var(--panel-white);
    border: 1px solid var(--border-light);

    padding: 8px 16px;

    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;

</style>

    "P4 The Antikythera mechanism.mp3"
  ];

  let audioElements = [null, null, null, null];
  let partStatus = { 1: { submitted: false, finishedAudio: false }, 2: { submitted: false, finishedAudio: false }, 3: { submitted: false, finishedAudio: false }, 4: { submitted: false, finishedAudio: false } };
  let globalTimerSeconds = 0, globalInterval = null;
  let scheduleTimeouts = [];
  let allPartsCompleted = false;
  let reviewTimeoutId = null;
  let currentPlayingAudio = null;
  let currentPartPlaying = 0;

  function showToast(msg) { let t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1500); }
  function updateGlobalTimerDisplay() { 
    let el=document.getElementById('globalTimerDisplay'); 
    let m=Math.floor(globalTimerSeconds/60), s=globalTimerSeconds%60; 
    el.textContent=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; 
    if(reviewTimeoutId && !allPartsCompleted) el.classList.add('warning'); 
    else el.classList.remove('warning');
  }

  function markPartSubmitted(part) {
    if(partStatus[part].submitted) return;
    partStatus[part].submitted = true;
    if(audioElements[part-1]) { audioElements[part-1].pause(); audioElements[part-1].currentTime = 0; }
    showToast(`Part ${part} submitted early.`);
    if(document.getElementById('partContainer').dataset.currentPart == part) document.getElementById('partContainer').classList.add('disabled-input');
    checkAllPartsCompletion();
  }

  function markPartFinishedAudio(part) {
    if(partStatus[part].finishedAudio) return;
    partStatus[part].finishedAudio = true;
    if(!partStatus[part].submitted) showToast(`Part ${part} audio finished.`);
    checkAllPartsCompletion();
  }

  function checkAllPartsCompletion() {
    let allDone = true;
    for(let p=1;p<=4;p++) if(!partStatus[p].submitted && !partStatus[p].finishedAudio) { allDone = false; break; }
    if(allDone && !allPartsCompleted) {
      allPartsCompleted = true;
      if(globalInterval) clearInterval(globalInterval);
      for(let t of scheduleTimeouts) clearTimeout(t);
      let hasEarly = Object.values(partStatus).some(st => st.submitted === true);
      if(hasEarly) { showFullReview(); }
      else { startReviewCountdown(); }
    }
  }

  function startReviewCountdown() {
    if(reviewTimeoutId) clearTimeout(reviewTimeoutId);
    globalTimerSeconds = 120;
    updateGlobalTimerDisplay();
    if(globalInterval) clearInterval(globalInterval);
    globalInterval = setInterval(() => {
      if(globalTimerSeconds <= 0) { clearInterval(globalInterval); showFullReview(); }
      else { globalTimerSeconds--; updateGlobalTimerDisplay(); }
    }, 1000);
    reviewTimeoutId = setTimeout(() => {}, 121000);
  }

  function showFullReview() {
    if(reviewTimeoutId) clearTimeout(reviewTimeoutId);
    if(globalInterval) clearInterval(globalInterval);
    let container = document.getElementById('partContainer');
    let resultsDiv = container.querySelector('.results-in-page');
    if(resultsDiv) {
      let table = '<h4>📊 Final Answer Review</h4><table class="results-table"><thead><tr><th>Question</th><th>Your Answer</th><th>Correct Answer</th><th>Result</th></tr></thead><tbody>';
      for(let i=1;i<=40;i++) {
        let user='—', correct='—', isCorrect=false;
        if(i<=10) { correct=ANSWERS.p1[`q${i}`]; user=document.querySelector(`input[name="q${i}"]`)?.value.trim() || '—'; isCorrect=user.toLowerCase()===correct.toLowerCase(); }
        else if(i<=20) {
          if(i<=16) { correct=ANSWERS.p2single[`q${i}`]; let sel=document.querySelector(`input[name="q${i}"]:checked`); user=sel?sel.value:'—'; isCorrect=user===correct; }
          else { correct=ANSWERS.p2match[`q${i}`]; let slot=document.querySelector(`.match-slot[data-q="${i}"] .tag`); user=slot?slot.dataset.value:'—'; isCorrect=user===correct; }
        }
        else if(i<=30) {
          if(i<=25) { correct=ANSWERS.p3single[`q${i}`]; let sel=document.querySelector(`input[name="q${i}"]:checked`); user=sel?sel.value:'—'; isCorrect=user===correct; }
          else { correct=ANSWERS.p3match[`q${i}`]; let slot=document.querySelector(`.match-slot[data-q="${i}"] .tag`); user=slot?slot.dataset.value:'—'; isCorrect=user===correct; }
        }
        else { correct=ANSWERS.p4[`q${i}`]; user=document.querySelector(`input[name="q${i}"]`)?.value.trim() || '—'; isCorrect=user.toLowerCase()===correct.toLowerCase(); }
        table += `<tr><td style="font-weight:600">${i}</td><td>${user}</td><td>${correct}</td><td class="${isCorrect?'result-correct':'result-incorrect'}">${isCorrect?'✔ Correct':'✖ Incorrect'}</td></tr>`;
      }
      table += '</tbody></table>';
      resultsDiv.innerHTML = table;
    }
    showToast("Test completed. Final review displayed.");
  }

  function initDragDropForPart() {
    const dragOptions = document.querySelectorAll('.drag-option');
    const slots = document.querySelectorAll('.match-slot');
    dragOptions.forEach(opt => {
      opt.setAttribute('draggable', 'true');
      opt.ondragstart = (e) => { e.dataTransfer.setData('text/plain', opt.dataset.value); opt.classList.add('dragging'); };
      opt.ondragend = (e) => { opt.classList.remove('dragging'); };
    });
    slots.forEach(slot => {
      slot.ondragover = e => e.preventDefault();
      slot.ondrop = (e) => {
        e.preventDefault();
        let partNow = parseInt(document.getElementById('partContainer').dataset.currentPart);
        if(partStatus[partNow].submitted) return;
        let val = e.dataTransfer.getData('text/plain');
        let source = document.querySelector(`.drag-option[data-value="${val}"]`);
        if(!source) return;
        let existingTag = slot.querySelector('.tag');
        if(existingTag) { let oldVal = existingTag.dataset.value; let oldOpt = document.querySelector(`.drag-option[data-value="${oldVal}"]`); if(oldOpt) oldOpt.classList.remove('hidden-in-pool'); existingTag.remove(); }
        let tag = document.createElement('span'); tag.className = 'tag'; tag.setAttribute('draggable','true'); tag.dataset.value = val; tag.textContent = source.textContent;
        slot.innerHTML = ''; slot.appendChild(tag); slot.classList.add('filled');
        source.classList.add('hidden-in-pool');
      };
    });
    let pool = document.querySelector('.drag-pool');
    if(pool) {
      pool.ondragover = e=>e.preventDefault();
      pool.ondrop = (e) => {
        let val = e.dataTransfer.getData('text/plain');
        let tag = document.querySelector(`.tag[data-value="${val}"]`);
        if(tag && tag.closest('.match-slot')) {
          let opt = document.querySelector(`.drag-option[data-value="${val}"]`);
          if(opt) opt.classList.remove('hidden-in-pool');
          tag.closest('.match-slot').innerHTML = ''; tag.closest('.match-slot').classList.remove('filled');
        }
      };
    }
  }

  function loadPart(part) {
    let container = document.getElementById('partContainer');
    container.dataset.currentPart = part;
    let html = part===1? PART1_HTML : part===2? PART2_HTML : part===3? PART3_HTML : PART4_HTML;
    container.innerHTML = html;
    document.getElementById('currentPartLabel').innerText = `Part ${part}`;
    if(partStatus[part].submitted) container.classList.add('disabled-input');
    else container.classList.remove('disabled-input');
    let submitBtn = document.createElement('button');
    submitBtn.textContent = `Submit Part ${part}`;
    submitBtn.className = 'part-submit-btn';
    submitBtn.onclick = () => { if(!partStatus[part].submitted && !partStatus[part].finishedAudio) markPartSubmitted(part); else showToast(`Part ${part} already completed`); };
    let panel = container.querySelector('.group:last-child') || container;
    panel.insertAdjacentElement('afterend', submitBtn);
    if(part===2 || part===3) initDragDropForPart();
  }

  function playSequentialAudio() {
    let idx = 0;
    function playNext() {
      if(idx >= 4) return;
      if(partStatus[idx+1].submitted) { idx++; playNext(); return; }
      let audio = new Audio(AUDIO_FILES[idx]);
      audioElements[idx] = audio;
      currentPlayingAudio = audio;
      currentPartPlaying = idx+1;
      audio.play().catch(e => console.warn("Audio play error:", e));
      let durationMs = DURATIONS[idx] * 1000;
      let timeoutId = setTimeout(() => {
        if(audio && !partStatus[idx+1].submitted) {
          audio.pause();
          audio.currentTime = 0;
          markPartFinishedAudio(idx+1);
        }
        idx++;
        playNext();
      }, durationMs);
      scheduleTimeouts.push(timeoutId);
    }
    playNext();
  }

  function earlySubmitAllHandler() {
    if(confirm("Early submit all parts? Test will end immediately.")) {
      for(let p=1;p<=4;p++) if(!partStatus[p].submitted && !partStatus[p].finishedAudio) markPartSubmitted(p);
      checkAllPartsCompletion();
    }
  }

  function init() {
    loadPart(1);
    document.querySelectorAll('.part-btn').forEach(btn => btn.addEventListener('click', (e) => { let p = parseInt(e.target.dataset.part); loadPart(p); }));
    document.getElementById('globalEarlySubmitBtn').addEventListener('click', earlySubmitAllHandler);
    document.getElementById('toggle-notes-btn').addEventListener('click',()=>document.body.classList.toggle('notes-open'));
    document.getElementById('notes-close').addEventListener('click',()=>document.body.classList.remove('notes-open'));
    playSequentialAudio();
    globalInterval = setInterval(()=>{ if(!allPartsCompleted && !reviewTimeoutId) globalTimerSeconds++; updateGlobalTimerDisplay(); }, 1000);
  }
  init();
</script>
</body>
</html>
